<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>诚达AI数字员工</title>
<!-- 添加到主屏幕时显示的图标 -->
<link rel="apple-touch-icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='20' fill='%230a1628'/%3E%3Ctext x='50' y='68' font-size='50' text-anchor='middle' fill='%2300a8ff' font-weight='bold'%3E诚%3C/text%3E%3C/svg%3E">
<!-- iOS 添加到主屏幕全屏 -->
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="诚达AI">
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'PingFang SC','Microsoft YaHei',sans-serif;}
body{background:#f5f6f8;overflow:hidden;height:100vh;}

/* ===== 启动屏 ===== */
.splash-screen{
  position:fixed;inset:0;z-index:999;
  background:linear-gradient(135deg,#0a1628 0%,#1a3a5c 50%,#0d2137 100%);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  transition:opacity .6s ease,transform .6s ease;
}
.splash-screen.hide{opacity:0;transform:scale(1.1);pointer-events:none;}
.splash-logo{
  width:80px;height:80px;border-radius:20px;
  background:linear-gradient(135deg,#00a8ff,#0066cc);
  display:flex;align-items:center;justify-content:center;
  font-size:38px;color:#fff;font-weight:800;
  box-shadow:0 8px 40px rgba(0,168,255,.3);
  animation:logoPop .8s cubic-bezier(.34,1.56,.64,1);
}
@keyframes logoPop{
  0%{transform:scale(.5);opacity:0}
  100%{transform:scale(1);opacity:1}
}
.splash-title{color:#fff;font-size:22px;font-weight:700;margin-top:20px;letter-spacing:2px;}
.splash-desc{color:rgba(255,255,255,.5);font-size:13px;margin-top:8px;}
.splash-loading{
  margin-top:40px;display:flex;gap:6px;
}
.splash-loading span{
  width:8px;height:8px;border-radius:50%;
  background:#00a8ff;animation:splashDot 1.4s infinite;
}
.splash-loading span:nth-child(2){animation-delay:.2s}
.splash-loading span:nth-child(3){animation-delay:.4s}
@keyframes splashDot{
  0%,80%,100%{transform:scale(.6);opacity:.3}
  40%{transform:scale(1);opacity:1}
}
.splash-version{position:absolute;bottom:40px;color:rgba(255,255,255,.2);font-size:11px;}
.splash-subtitle{color:rgba(255,255,255,.35);font-size:11px;margin-top:4px;}

/* ===== 主页面 ===== */
.main-app{display:none;height:100vh;flex-direction:column;}
.main-app.show{display:flex;}

.header{
  background:linear-gradient(135deg,#0a1628,#1a3a5c);
  color:#fff;padding:48px 16px 12px;
  display:flex;align-items:center;gap:10px;flex-shrink:0;
}
.header-icon{
  width:32px;height:32px;border-radius:8px;
  background:linear-gradient(135deg,#00a8ff,#0066cc);
  display:flex;align-items:center;justify-content:center;
  font-size:14px;font-weight:700;flex-shrink:0;
}
.header-info{flex:1}
.header-info .name{font-size:15px;font-weight:600}
.header-info .status{font-size:10px;color:rgba(255,255,255,.6)}
.header-extra{font-size:11px;color:rgba(255,255,255,.4);}

/* 聊天区 */
.chat-wrap{flex:1;overflow-y:auto;padding:12px 14px 80px;-webkit-overflow-scrolling:touch;}
.welcome-screen{
  display:flex;flex-direction:column;align-items:center;
  justify-content:center;padding:50px 20px 20px;text-align:center;
}
.welcome-icon{width:48px;height:48px;border-radius:50%;background:linear-gradient(135deg,#00a8ff,#0066cc);display:flex;align-items:center;justify-content:center;font-size:22px;margin-bottom:12px;}
.welcome-title{font-size:18px;font-weight:700;color:#0a1628;margin-bottom:4px;}
.welcome-desc{font-size:12px;color:#999;line-height:1.5;margin-bottom:20px;}
.welcome-questions{width:100%}
.welcome-questions button{
  display:block;width:100%;padding:10px 14px;
  background:#fff;border:1px solid #eee;border-radius:8px;
  font-size:13px;color:#333;margin-bottom:6px;cursor:pointer;
  text-align:left;transition:all .1s;
}
.welcome-questions button:active{background:#f0f7ff;border-color:#00a8ff;transform:scale(.98);}

.msg{margin-bottom:14px;display:flex;gap:8px;align-items:flex-start;animation:msgIn .2s ease;}
@keyframes msgIn{0%{opacity:0;transform:translateY(8px)}100%{opacity:1;transform:translateY(0)}}
.msg.user{flex-direction:row-reverse;}
.msg-avatar{width:28px;height:28px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:11px;}
.msg.user .msg-avatar{background:#ff9800;color:#fff;}
.msg.bot .msg-avatar{background:#00a8ff;color:#fff;}
.msg-bubble{max-width:82%;padding:9px 13px;border-radius:10px;font-size:13px;line-height:1.6;}
.msg.user .msg-bubble{background:#ff9800;color:#fff;border-bottom-right-radius:3px;}
.msg.bot .msg-bubble{background:#fff;color:#333;border-bottom-left-radius:3px;box-shadow:0 1px 3px rgba(0,0,0,.05);}
.msg.bot .msg-bubble strong{color:#00a8ff;}
.msg.bot .msg-bubble code{background:#f0f4f8;padding:1px 4px;border-radius:3px;font-size:12px;}

/* 输入区 */
.input-bar{
  position:fixed;bottom:0;left:0;right:0;
  background:#fff;padding:6px 12px 12px;
  display:flex;gap:6px;align-items:center;
  box-shadow:0 -2px 8px rgba(0,0,0,.04);
  z-index:20;
}
.input-bar input{
  flex:1;height:38px;border:1px solid #e0e0e0;
  border-radius:19px;padding:0 14px;font-size:13px;outline:none;
}
.input-bar input:focus{border-color:#00a8ff}
.input-bar button{
  width:38px;height:38px;border-radius:50%;
  background:linear-gradient(135deg,#00a8ff,#0066cc);
  color:#fff;border:none;font-size:16px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
}

/* 加载动画 */
.loading-dots{display:inline-flex;gap:3px;padding:2px 0;}
.loading-dots span{width:5px;height:5px;background:#aaa;border-radius:50%;animation:ldot 1.4s infinite;}
.loading-dots span:nth-child(2){animation-delay:.2s}
.loading-dots span:nth-child(3){animation-delay:.4s}
@keyframes ldot{0%,80%,100%{opacity:.3}40%{opacity:1}}

/* 添加到桌面提示 */
.install-tip{
  display:none;position:fixed;bottom:60px;left:12px;right:12px;
  background:rgba(10,22,40,.9);color:#fff;border-radius:12px;
  padding:14px 16px;font-size:13px;z-index:30;
  backdrop-filter:blur(10px);animation:tipUp .3s ease;
}
@keyframes tipUp{0%{transform:translateY(20px);opacity:0}100%{transform:translateY(0);opacity:1}}
.install-tip .close{
  float:right;background:none;border:none;color:rgba(255,255,255,.5);font-size:18px;cursor:pointer;padding:0 4px;
}
.install-tip strong{color:#00a8ff;}
</style>
</head>
<body>

<!-- ===== 启动屏 ===== -->
<div class="splash-screen" id="splash">
  <div class="splash-logo">诚</div>
  <div class="splash-title">诚达AI数字员工</div>
  <div class="splash-desc">诚达工程投资咨询 · 专属AI助手</div>
  <div class="splash-loading">
    <span></span><span></span><span></span>
  </div>
  <div class="splash-subtitle">正在加载知识库...</div>
  <div class="splash-version">v1.0 · 2026</div>
</div>

<!-- ===== 主页面 ===== -->
<div class="main-app" id="mainApp">

  <div class="header">
    <div class="header-icon">诚</div>
    <div class="header-info">
      <div class="name">诚达AI数字员工</div>
      <div class="status">诚达工程投资咨询</div>
    </div>
    <div class="header-extra" onclick="showWelcome()">重置</div>
  </div>

  <div class="chat-wrap" id="chatWrap">
    <!-- 欢迎页 -->
    <div class="welcome-screen" id="welcomeScreen">
      <div class="welcome-icon">🏗️</div>
      <div class="welcome-title">您好，有什么可以帮您？</div>
      <div class="welcome-desc">造价问答 · 合同审查 · 政策解读 · 司法鉴定辅助</div>
      <div class="welcome-questions">
        <button onclick="askQuestion('建设工程合同中背靠背支付条款有什么风险？')">📋 背靠背支付条款风险</button>
        <button onclick="askQuestion('2024版清单计价规范相比2013版有什么核心变化？')">📊 2024清单计价规范核心变化</button>
        <button onclick="askQuestion('黑龙江省冬季施工人工费补偿标准是多少？')">❄️ 黑龙江冬季施工人工费</button>
        <button onclick="askQuestion('造价师如何从算得准转型到算得赢？')">🎯 造价师法商转型路径</button>
      </div>
    </div>
  </div>

  <div class="input-bar">
    <input id="userInput" placeholder="输入问题..." onkeydown="if(event.key==='Enter')sendMessage()">
    <button onclick="sendMessage()">➤</button>
  </div>
</div>

<!-- 安装提示 -->
<div class="install-tip" id="installTip">
  <button class="close" onclick="closeInstallTip()">✕</button>
  📌 点击 Safari 底部 <strong>「分享」</strong> → <strong>「添加到主屏幕」</strong><br>
  即可像小程序一样使用
</div>

<script>
// ====== Dify 配置 ======
const DIFY_API_KEY = 'app-kDBKdU4Y38cUB1VFMYdp66L8';
const DIFY_API_URL = 'https://api.dify.ai/v1/chat-messages';

// ====== 启动动画 ======
setTimeout(() => {
  document.getElementById('splash').classList.add('hide');
  document.getElementById('mainApp').classList.add('show');
  document.getElementById('chatWrap').scrollTop = 0;
  // 检测是否从浏览器打开（非添加到桌面）
  if (!window.navigator.standalone && !matchMedia('(display-mode: standalone)').matches) {
    setTimeout(() => {
      document.getElementById('installTip').style.display = 'block';
    }, 1500);
  }
}, 1500);

function closeInstallTip() {
  document.getElementById('installTip').style.display = 'none';
}

// ====== 聊天逻辑 ======
let conversationId = null;

function askQuestion(text) {
  document.getElementById('welcomeScreen').style.display = 'none';
  addMessage(text, 'user');
  processQuestion(text);
}

function sendMessage() {
  const input = document.getElementById('userInput');
  const text = input.value.trim();
  if (!text) return;
  input.value = '';
  document.getElementById('welcomeScreen').style.display = 'none';
  addMessage(text, 'user');
  processQuestion(text);
}

async function processQuestion(text) {
  // 显示加载中
  const loadId = 'ld-' + Date.now();
  const loadDiv = document.createElement('div');
  loadDiv.className = 'msg bot';
  loadDiv.id = loadId;
  loadDiv.innerHTML = '<div class="msg-avatar">诚</div><div class="msg-bubble"><div class="loading-dots"><span></span><span></span><span></span></div></div>';
  document.getElementById('chatWrap').appendChild(loadDiv);
  scrollToBottom();

  try {
    const resp = await fetch(DIFY_API_URL, {
      method: 'POST',
      headers: {
        'Authorization': 'Bearer ' + DIFY_API_KEY,
        'Content-Type': 'application/json'
      },
      body: JSON.stringify({
        inputs: {},
        query: text,
        response_mode: 'blocking',
        user: 'chengda',
        conversation_id: conversationId || ''
      })
    });

    const data = await resp.json();

    if (data.answer) {
      document.getElementById(loadId).innerHTML =
        '<div class="msg-avatar">诚</div><div class="msg-bubble">' + formatMsg(data.answer) + '</div>';
      if (data.conversation_id) conversationId = data.conversation_id;
    } else {
      document.getElementById(loadId).innerHTML =
        '<div class="msg-avatar">诚</div><div class="msg-bubble">⚠️ 服务暂不可用，请稍后再试</div>';
    }
  } catch (e) {
    document.getElementById(loadId).innerHTML =
      '<div class="msg-avatar">诚</div><div class="msg-bubble">⚠️ 网络连接异常，请检查网络后重试</div>';
  }
  scrollToBottom();
}

function formatMsg(text) {
  return text
    .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
    .replace(/\n/g, '<br>')
    .replace(/- /g, '• ')
    .replace(/`(.*?)`/g, '<code>$1</code>');
}

function addMessage(text, role) {
  const div = document.createElement('div');
  div.className = 'msg ' + role;
  div.innerHTML = '<div class="msg-avatar">' + (role === 'user' ? '我' : '诚') + '</div><div class="msg-bubble">' + text + '</div>';
  document.getElementById('chatWrap').appendChild(div);
  scrollToBottom();
}

function scrollToBottom() {
  const w = document.getElementById('chatWrap');
  setTimeout(() => { w.scrollTop = w.scrollHeight; }, 50);
}

function showWelcome() {
  document.getElementById('welcomeScreen').style.display = 'flex';
  document.getElementById('chatWrap').innerHTML = '';
  document.getElementById('chatWrap').appendChild(document.getElementById('welcomeScreen'));
  conversationId = null;
}
</script>
</body>
</html>
